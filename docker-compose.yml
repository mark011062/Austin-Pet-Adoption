services:
  postgres:
    image: postgres:15
    container_name: austin_pet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pet_adoption_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: